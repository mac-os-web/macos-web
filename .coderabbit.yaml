# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# ============================================================
# CodeRabbit 설정
# Stack: Vite + React 19 + TypeScript 6 + Tailwind CSS 4
#        + react-i18next + Temporal API + Lucide Icons
# ============================================================

language: "ko-KR"

# ── 리뷰 설정 ──────────────────────────────────────────────
reviews:
  profile: "assertive"
  request_changes_workflow: true

  # PR 요약
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  collapse_walkthrough: false

  # 이슈 연동
  assess_linked_issues: true
  related_issues: true
  related_prs: true

  # 라벨
  suggested_labels: true
  auto_apply_labels: false
  labeling_instructions:
    - label: "bug"
      instructions: "버그 수정 관련 변경사항이 포함된 경우"
    - label: "feature"
      instructions: "새로운 기능 추가가 포함된 경우"
    - label: "refactor"
      instructions: "기능 변경 없이 코드 구조 개선인 경우"
    - label: "docs"
      instructions: "문서만 수정된 경우"
    - label: "breaking-change"
      instructions: "기존 API나 인터페이스에 호환성 깨지는 변경이 있는 경우"
    - label: "security"
      instructions: "보안 관련 수정이 포함된 경우"
    - label: "performance"
      instructions: "성능 최적화 관련 변경이 포함된 경우"
    - label: "test"
      instructions: "테스트 코드만 추가/수정된 경우"
    - label: "i18n"
      instructions: "다국어(ko/en/ja) 번역 관련 변경이 포함된 경우"
    - label: "style"
      instructions: "UI/디자인/CSS 관련 변경만 포함된 경우"

  # 리뷰어
  suggested_reviewers: true
  auto_assign_reviewers: false

  # 불필요한 요소 비활성화
  poem: false
  in_progress_fortune: false

  # AI 에이전트용 프롬프트
  enable_prompt_for_ai_agents: true

  # ── 파일 필터 ────────────────────────────────────────────
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/coverage/**"
    - "!**/.cache/**"
    - "!**/pnpm-lock.yaml"
    - "!**/package-lock.json"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/*.map"
    - "!**/*.svg"
    - "!**/*.ico"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.gif"
    - "!**/*.webp"
    - "!**/*.woff"
    - "!**/*.woff2"
    - "!**/*.ttf"
    - "!**/.env*"

  # ── 경로별 리뷰 지침 ────────────────────────────────────

  path_instructions:
    # ── React 컴포넌트 ──
    - path: "src/components/**/*.tsx"
      instructions: |
        React 컴포넌트 리뷰 규칙:
        - React 19 + TypeScript 사용 중
        - 날짜/시간은 반드시 Temporal API 사용 (new Date() 금지)
        - Date 객체 사용 발견 시 Temporal로 마이그레이션 제안
        - Temporal 주의: month는 1-based(1~12), dayOfWeek는 1(월)~7(일)
        - toLocaleDateString/toLocaleTimeString 대신 toLocaleString 사용 확인
        - 하드코딩된 한국어/일본어/영어 텍스트 금지 → t("key") 사용 필수
        - useTranslation()은 반드시 컴포넌트 함수 안에서 호출 (Hook 규칙)
        - locale 하드코딩("ko-KR" 등) 금지 → i18n.language 사용
        - Tailwind CSS 클래스 사용 (인라인 스타일은 backdrop-filter 등 필요시에만)
        - lucide-react에서 아이콘 import
        - useEffect 의존성 배열 누락 체크
        - key prop 누락 체크 (리스트 렌더링)
        - console.log 잔존 체크
        - framer-motion 사용 금지 (CSS transition/animation 사용)

    # ── 메인 App ──
    - path: "src/App.tsx"
      instructions: |
        메인 App 컴포넌트 리뷰:
        - 윈도우 관리 상태(zIndex, isOpen, isMinimized) 일관성 확인
        - Dock 앱 이름은 t("dock.xxx") 사용
        - 컨텍스트 메뉴 항목은 t("contextMenu.xxx") 사용
        - APP_CONFIG의 title도 i18n 키 사용 여부 확인
        - useCallback 의존성 배열 정확성 확인

    # ── i18n 설정 ──
    - path: "src/i18n/**/*.ts"
      instructions: |
        i18n 초기화 파일 리뷰:
        - i18next + react-i18next 사용 중
        - Temporal polyfill 등록 로직 확인 (globalThis 조건부 할당)
        - fallbackLng 설정 확인
        - interpolation.escapeValue: false 유지 (React가 XSS 방어)

    # ── 번역 파일 ──
    - path: "src/i18n/locales/*.json"
      instructions: |
        번역 JSON 리뷰 규칙:
        - ko.json, en.json, ja.json 3개 파일의 키 구조가 완전히 동일해야 함
        - 한 파일에 키가 추가되면 나머지 2개에도 반드시 추가
        - 인터폴레이션 변수({{count}}, {{query}} 등)가 3개 파일 모두 동일한지 확인
        - 일본어(ja.json)는 실제 macOS 일본어판 용어를 따르는지 확인
        - 영어(en.json)는 실제 macOS 영어판 용어를 따르는지 확인
        - 날짜/시간 포맷은 번역 파일에 넣지 않음 (Temporal이 처리)

    # ── 위젯 ──
    - path: "src/components/Widgets.tsx"
      instructions: |
        위젯 컴포넌트 리뷰:
        - ClockWidget: Temporal.Now.plainDateTimeISO() 사용 확인
        - CalendarWidget: month는 1-based (Date의 0-based가 아님)
        - CalendarWidget: dayOfWeek는 1(월)~7(일) — 일요일 시작이면 %7 변환 필요
        - WeatherWidget: 날씨 데이터 라벨은 t() 사용
        - WidgetShell: 드래그 이벤트 리스너 정리(cleanup) 확인
        - toLocaleString에 i18n.language를 locale로 전달하는지 확인

    # ── Window 컴포넌트 ──
    - path: "src/components/Window.tsx"
      instructions: |
        Window 컴포넌트 리뷰:
        - 드래그/리사이즈 이벤트 리스너 cleanup 확인 (메모리 누수 방지)
        - useCallback 의존성 배열 정확성
        - 최소 크기(minWidth: 300, minHeight: 200) 제한 확인
        - isMaximized 상태에서 드래그/리사이즈 비활성화 확인

    # ── 공통 TypeScript ──
    - path: "**/*.{ts,tsx}"
      instructions: |
        TypeScript 공통 리뷰 규칙:
        - any 타입 사용 금지, 반드시 구체적 타입 정의
        - as 타입 단언 최소화, type guard 사용 권장
        - 미사용 import 체크
        - console.log 잔존 체크
        - 하드코딩된 문자열 / 매직넘버 지적
        - new Date() 사용 발견 시 Temporal API 마이그레이션 제안
        - erasableSyntaxOnly 모드: enum, namespace 사용 금지

    # ── Tailwind CSS ──
    - path: "**/*.css"
      instructions: |
        Tailwind CSS 4.x 리뷰:
        - @import 'tailwindcss' 사용 확인 (v4 방식)
        - 불필요한 커스텀 CSS 작성 지양 (유틸리티 클래스 우선)
        - CSS 애니메이션(@keyframes) 정의 확인

    # ── Vite 설정 ──
    - path: "vite.config.ts"
      instructions: |
        Vite 설정 리뷰:
        - @vitejs/plugin-react 포함 확인
        - @tailwindcss/vite 포함 확인
        - 빌드 타겟 설정 확인

    # ── TypeScript 설정 ──
    - path: "tsconfig*.json"
      instructions: |
        TypeScript 설정 리뷰:
        - target: es2025 이상
        - lib에 ESNext.Temporal 포함 확인
        - erasableSyntaxOnly: true 확인
        - verbatimModuleSyntax: true 확인

    # ── 설정 파일 ──
    - path: "**/*.{json,yaml,yml}"
      instructions: |
        설정 파일 리뷰:
        - 민감한 정보(API key, secret) 하드코딩 여부 확인
        - 버전 호환성 이슈 확인

    # ── 문서 ──
    - path: "docs/**/*.md"
      instructions: |
        문서 리뷰:
        - 마크다운 문법 오류 확인
        - 코드 블록 언어 태그 확인
        - 링크 유효성 확인

    # ── 테스트 ──
    - path: "**/*.test.{ts,tsx}"
      instructions: |
        테스트 코드 리뷰 (테스트가 존재하는 경우에만 적용):
        - vitest 사용 중
        - 테스트 작성을 강제하지 않음. 이미 작성된 테스트의 품질만 확인.
        - 테스트명이 의도를 명확히 설명하는지 확인
        - 불필요하게 복잡한 mock 구성 지적

  # ── 자동 리뷰 ───────────────────────────────────────────
  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 5
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "draft"

  # ── Pre-merge 체크 ──────────────────────────────────────
  pre_merge_checks:
    title:
      mode: "error"
      requirements: |
        PR 제목은 Conventional Commits 형식을 따라야 합니다.
        형식: <type>: <description>
        type: feat, fix, refactor, docs, test, chore, perf, style
        예시: feat: add language toggle button to MenuBar
        제목은 50자 이내 권장.
    description:
      mode: "warning"
    issue_assessment:
      mode: "warning"
    docstrings:
      mode: "off"

  # ── Finishing Touches ───────────────────────────────────
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: false

  # ── 정적 분석 도구 ──────────────────────────────────────
  tools:
    # TypeScript
    biome:
      enabled: true
    oxc:
      enabled: true
    eslint:
      enabled: false

    # 보안 스캐너
    gitleaks:
      enabled: true
    trufflehog:
      enabled: true
    opengrep:
      enabled: true
    semgrep:
      enabled: true

    # 마크다운/YAML
    markdownlint:
      enabled: true
    yamllint:
      enabled: true

    # HTML/CSS
    htmlhint:
      enabled: true
    stylelint:
      enabled: false

    # 패턴 매칭
    ast-grep:
      essential_rules: true

    # GitHub Checks
    github-checks:
      enabled: true
      timeout_ms: 120000

    # 사용하지 않는 도구 비활성화
    ruff:
      enabled: false
    pylint:
      enabled: false
    flake8:
      enabled: false
    phpstan:
      enabled: false
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    golangci-lint:
      enabled: false
    swiftlint:
      enabled: false
    detekt:
      enabled: false
    clippy:
      enabled: false
    rubocop:
      enabled: false
    buf:
      enabled: false
    regal:
      enabled: false
    pmd:
      enabled: false
    clang:
      enabled: false
    cppcheck:
      enabled: false
    fortitudeLint:
      enabled: false
    shopifyThemeCheck:
      enabled: false
    luacheck:
      enabled: false
    brakeman:
      enabled: false
    sqlfluff:
      enabled: false
    prismaLint:
      enabled: false
    checkmake:
      enabled: false
    blinter:
      enabled: false
    circleci:
      enabled: false
    hadolint:
      enabled: false
    checkov:
      enabled: false
    trivy:
      enabled: false
    actionlint:
      enabled: false
    shellcheck:
      enabled: false
    dotenvLint:
      enabled: false

# ── 채팅 설정 ─────────────────────────────────────────────
chat:
  auto_reply: true
  art: false

# ── 지식 베이스 ───────────────────────────────────────────
knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/CLAUDE.md"
      - "**/.cursorrules"
      - "**/AGENTS.md"
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"

# ── 코드 생성 ─────────────────────────────────────────────
code_generation:
  docstrings:
    language: "ko-KR"
    path_instructions:
      - path: "**/*.{ts,tsx}"
        instructions: "TSDoc 형식 사용. 한국어 설명 작성."
  unit_tests:
    path_instructions:
      - path: "**/*.{ts,tsx}"
        instructions: "vitest 사용. 수동 요청 시에만 생성."

# ── 이슈 설정 ─────────────────────────────────────────────
issue_enrichment:
  planning:
    enabled: true
  auto_enrich:
    enabled: false
